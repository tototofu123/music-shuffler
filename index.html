*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif}
.wrap{padding:2rem 1.5rem;max-width:600px;margin:0 auto}
.eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:1.5rem;text-align:center}
.filters-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{font-size:12px;font-family:'DM Sans',sans-serif;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);border-radius:99px;padding:5px 12px;cursor:pointer;transition:all .15s}
.chip:hover{background:var(--color-background-secondary)}
.chip.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:transparent}
.card{width:100%;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:2rem;text-align:center;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;margin:1.5rem 0;transition:border-color .2s}
.card.loaded{border-color:var(--color-border-primary)}
.tag-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:4px}
.tag{font-size:11px;letter-spacing:.06em;text-transform:uppercase;border-radius:99px;padding:3px 10px}
.tag-genre{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.tag-type{background:var(--color-background-info);color:var(--color-text-info)}
.song-title{font-family:'DM Serif Display',serif;font-size:24px;line-height:1.2;color:var(--color-text-primary)}
.song-artist{font-size:14px;color:var(--color-text-secondary)}
.song-year{font-size:12px;color:var(--color-text-tertiary)}
.placeholder{font-size:15px;color:var(--color-text-tertiary);font-style:italic;font-family:'DM Serif Display',serif}
.btn-row{display:flex;gap:10px;justify-content:center}
.btn{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;border-radius:99px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);padding:10px 22px;cursor:pointer;transition:background .15s,transform .1s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--color-background-secondary)}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--color-text-primary);color:var(--color-background-primary);border-color:transparent}
.btn-primary:hover{opacity:.85;background:var(--color-text-primary)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.meta{font-size:12px;color:var(--color-text-tertiary);text-align:center;margin-top:1rem}
.fade-in{animation:fadeIn .35s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.spin{display:inline-block;animation:spin .5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

const GENRES = [...new Set(ALL_SONGS.map(s=>s.g))].sort();
const TYPES = ["Original","Remix","Acoustic","Lo-fi","Classical"];

let activeGenres = new Set();
let activeTypes = new Set();
let lastIdx = -1;
let count = 0;

function buildFilters() {
  const gf = document.getElementById('genreFilters');
  const tf = document.getElementById('typeFilters');
  gf.innerHTML = '<button class="chip active" data-g="all" onclick="toggleGenre(this,\'all\')">All</button>'
    + GENRES.map(g=>`<button class="chip" data-g="${g}" onclick="toggleGenre(this,'${g}')">${g}</button>`).join('');
  tf.innerHTML = '<button class="chip active" data-t="all" onclick="toggleType(this,\'all\')">All</button>'
    + TYPES.map(tp=>`<button class="chip" data-t="${tp}" onclick="toggleType(this,'${tp}')">${tp}</button>`).join('');
}

function toggleGenre(el, val) {
  if(val==='all') {
    activeGenres.clear();
    document.querySelectorAll('#genreFilters .chip').forEach(c=>c.classList.remove('active'));
    el.classList.add('active');
  } else {
    document.querySelector('#genreFilters .chip[data-g="all"]').classList.remove('active');
    el.classList.toggle('active');
    if(el.classList.contains('active')) activeGenres.add(val); else activeGenres.delete(val);
    if(activeGenres.size===0) {
      document.querySelector('#genreFilters .chip[data-g="all"]').classList.add('active');
    }
  }
}

function toggleType(el, val) {
  if(val==='all') {
    activeTypes.clear();
    document.querySelectorAll('#typeFilters .chip').forEach(c=>c.classList.remove('active'));
    el.classList.add('active');
  } else {
    document.querySelector('#typeFilters .chip[data-t="all"]').classList.remove('active');
    el.classList.toggle('active');
    if(el.classList.contains('active')) activeTypes.add(val); else activeTypes.delete(val);
    if(activeTypes.size===0) {
      document.querySelector('#typeFilters .chip[data-t="all"]').classList.add('active');
    }
  }
}

function getPool() {
  return ALL_SONGS.filter(s =>
    (activeGenres.size===0 || activeGenres.has(s.g)) &&
    (activeTypes.size===0 || activeTypes.has(s.tp))
  );
}

function ytSearch(s) {
  return 'https://www.youtube.com/results?search_query='+encodeURIComponent(s.t+' '+s.a+' official audio');
}

function shuffle() {
  const pool = getPool();
  if(pool.length===0) {
    document.getElementById('card').innerHTML='<p class="placeholder">No songs match your filters</p>';
    return;
  }
  const btn = document.getElementById('shuffleBtn');
  const icon = document.getElementById('btnIcon');
  icon.innerHTML='<span class="spin">&#x21BB;</span>';
  btn.disabled=true;
  setTimeout(()=>{
    let idx;
    do { idx=Math.floor(Math.random()*pool.length); } while(pool.length>1 && pool[idx]===pool[lastIdx]);
    lastIdx=idx;
    count++;
    const s=pool[idx];
    const card=document.getElementById('card');
    card.classList.add('loaded');
    card.innerHTML=`<div class="fade-in">
      <div class="tag-row">
        <span class="tag tag-genre">${s.g}</span>
        <span class="tag tag-type">${s.tp}</span>
      </div>
      <p class="song-title">${s.t}</p>
      <p class="song-artist">${s.a}</p>
      <p class="song-year">${s.y}</p>
    </div>`;
    const ytBtn=document.getElementById('ytBtn');
    ytBtn.href=ytSearch(s);
    ytBtn.style.display='inline-flex';
    document.getElementById('meta').textContent=count+' shuffled · '+pool.length+' songs in pool';
    icon.innerHTML='&#x21BB;';
    btn.disabled=false;
  },300);
}

buildFilters();
