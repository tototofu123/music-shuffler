<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shuffler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="add_songs/shuffle.svg">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#f7f5f0" id="themeMeta">
</head>

<body>

  <div class="loading-bar" id="loadingBar" style="width:0%"></div>

  <header>
    <div class="wordmark">shuf<em>fler</em></div>
    <div class="db-status" id="dbStatus">loading database…</div>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">
      <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
      </svg>
    </button>
  </header>

  <div class="section">
    <div class="section-label">Genre</div>
    <div class="chip-row" id="genreFilters"></div>
  </div>

  <div class="section">
    <div class="section-label">Type</div>
    <div class="chip-row" id="typeFilters"></div>
  </div>

  <div class="divider"></div>

  <div class="card-wrap">
    <div class="card" id="card">
      <p class="empty-state">Press shuffle to discover a song</p>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="shuffleBtn" onclick="shuffle()" disabled>
      <span id="btnIcon"><img src="add_songs/shuffle.svg" alt="shuffle" width="18" height="18" style="vertical-align: middle;"></span> Shuffle
    </button>
    <a class="btn btn-yt" id="ytBtn" href="#" target="_blank" style="display:none">
      &#9654; Play on YouTube
    </a>
    <p class="meta" id="meta"></p>
  <div id="playlist" class="playlist"></div>
</div>

  <div class="pool-info" id="poolInfo"></div>


  <!-- sql.js: SQLite compiled to WebAssembly -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
  <script src="script.js"></script>
</body>

</html>
