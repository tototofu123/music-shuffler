<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shuffler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f7f5f0;
      --bg2: #efede8;
      --bg3: #e6e3dc;
      --text: #1a1816;
      --text2: #6b6760;
      --text3: #a09d98;
      --border: rgba(26, 24, 22, 0.12);
      --border2: rgba(26, 24, 22, 0.22);
      --accent: #c8502a;
      --accent2: #f0ebe3;
      --radius: 14px;
      --radius-sm: 8px;
    }

    html,
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 4rem;
    }

    /* Header */
    header {
      width: 100%;
      max-width: 680px;
      margin-bottom: 3rem;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .wordmark {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .wordmark em {
      font-style: italic;
      color: var(--accent);
    }

    .db-status {
      font-size: 12px;
      color: var(--text3);
      letter-spacing: 0.04em;
      margin-left: auto;
    }

    .db-status.ready {
      color: #5a8a5a;
    }

    .db-status.error {
      color: var(--accent);
    }

    /* Filter section */
    .section {
      width: 100%;
      max-width: 680px;
      margin-bottom: 1.25rem;
    }

    .section-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 10px;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px;
      font-weight: 400;
      padding: 5px 13px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.14s ease;
      white-space: nowrap;
      user-select: none;
    }

    .chip:hover {
      border-color: var(--border2);
      background: var(--bg2);
      color: var(--text);
    }

    .chip.active {
      background: var(--text);
      border-color: var(--text);
      color: var(--bg);
    }

    .chip.active:hover {
      background: #333;
    }

    /* Divider */
    .divider {
      width: 100%;
      max-width: 680px;
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    /* Card */
    .card-wrap {
      width: 100%;
      max-width: 680px;
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0.5rem 0 2rem;
    }

    .card {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      text-align: center;
      transition: border-color 0.2s;
    }

    .card.has-song {
      border-color: var(--border2);
      background: #fff;
    }

    .empty-state {
      color: var(--text3);
      font-style: italic;
      font-family: 'DM Serif Display', serif;
      font-size: 17px;
    }

    .tag-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      border-radius: 99px;
      padding: 4px 11px;
    }

    .tag-genre {
      background: var(--bg2);
      color: var(--text2);
      border: 1px solid var(--border);
    }

    .tag-type {
      background: #fef3ee;
      color: var(--accent);
      border: 1px solid rgba(200, 80, 42, 0.18);
    }

    .song-title {
      font-family: 'DM Serif Display', serif;
      font-size: 30px;
      line-height: 1.2;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    .song-artist {
      font-size: 15px;
      color: var(--text2);
      margin-bottom: 4px;
    }

    .song-year {
      font-size: 12px;
      color: var(--text3);
    }

    /* Buttons */
    .actions {
      width: 100%;
      max-width: 680px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 11px 24px;
      border-radius: 99px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: all 0.14s;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--bg2);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: var(--text);
      color: var(--bg);
      border-color: transparent;
    }

    .btn-primary:hover {
      background: #333;
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .btn-yt {
      color: var(--text2);
    }

    .meta {
      margin-left: auto;
      font-size: 12px;
      color: var(--text3);
    }

    /* Animations */
    .spin {
      display: inline-block;
      animation: spin 0.5s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .fade-up {
      animation: fadeUp 0.32s ease forwards;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Loading overlay */
    .loading-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 2px;
      background: var(--accent);
      transition: width 0.3s ease;
      z-index: 999;
    }

    /* Pool indicator */
    .pool-info {
      font-size: 11.5px;
      color: var(--text3);
      margin-top: 10px;
      text-align: center;
      width: 100%;
      max-width: 680px;
    }

    .pool-info span {
      color: var(--text2);
      font-weight: 500;
    }

    /* Query display (debug/fun) */
    .query-box {
      width: 100%;
      max-width: 680px;
      margin-top: 2rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      display: none;
    }

    .query-box.visible {
      display: block;
    }

    .query-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 6px;
    }

    .query-code {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--text2);
      white-space: pre-wrap;
      word-break: break-all;
    }

    .query-code .kw {
      color: var(--accent);
      font-weight: 600;
    }

    .query-code .val {
      color: #5a7a9a;
    }
  .playlist {
  margin-top: 2rem;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.playlist-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 15px;
  background: var(--color-background-secondary, #f4f4f5);
  border-radius: 8px;
  font-size: 14px;
}
.playlist-item .song-info {
  display: flex;
  flex-direction: column;
}
.playlist-item .song-title-sm {
  font-weight: 500;
  color: var(--color-text-primary, #111);
}
.playlist-item .song-artist-sm {
  font-size: 12px;
  color: var(--color-text-secondary, #666);
}
.playlist-item .song-tags-sm {
  display: flex;
  gap: 4px;
}
.playlist-item .tag-sm {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  text-transform: uppercase;
}
</style>
</head>

<body>

  <div class="loading-bar" id="loadingBar" style="width:0%"></div>

  <header>
    <div class="wordmark">shuf<em>fler</em></div>
    <div class="db-status" id="dbStatus">loading database…</div>
  </header>

  <div class="section">
    <div class="section-label">Genre</div>
    <div class="chip-row" id="genreFilters"></div>
  </div>

  <div class="section">
    <div class="section-label">Type</div>
    <div class="chip-row" id="typeFilters"></div>
  </div>

  <div class="divider"></div>

  <div class="card-wrap">
    <div class="card" id="card">
      <p class="empty-state">Press shuffle to discover a song</p>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="shuffleBtn" onclick="shuffle()" disabled>
      <span id="btnIcon">&#x21BB;</span> Shuffle
    </button>
    <a class="btn btn-yt" id="ytBtn" href="#" target="_blank" style="display:none">
      &#9654; Play on YouTube
    </a>
    <p class="meta" id="meta"></p>
  <div id="playlist" class="playlist"></div>
</div>

  <div class="pool-info" id="poolInfo"></div>

  <div class="query-box" id="queryBox">
    <div class="query-label">Last SQL query</div>
    <div class="query-code" id="queryCode"></div>
  </div>

  <!-- sql.js: SQLite compiled to WebAssembly -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
  <script>
    const SONGS_URL = 'https://raw.githubusercontent.com/tototofu123/music-shuffler/main/data/songs.json';
    const GENRES = ["Hip-hop", "R&B", "Indie Rock", "Indie Folk", "Pop", "Electronic", "Psych Pop", "Alt Rock", "Classic Rock", "Jazz", "Classical", "Lo-fi", "Soul", "Blues", "Country", "Metal", "Latin", "Afrobeats", "K-pop", "Reggae", "Synth Pop", "Punk", "Disco", "Gospel", "Ambient", "Indie Pop"];
    const TYPES = ["Original", "Remix", "Acoustic", "Lo-fi", "Classical"];

    let db = null;
    let activeGenres = new Set();
    let activeTypes = new Set();
    let shuffleCount = 0;
    let lastRowId = -1;

    // ── Progress bar ──────────────────────────────────────────
    function setProgress(pct) {
      document.getElementById('loadingBar').style.width = pct + '%';
    }

    // ── Build filter chips ────────────────────────────────────
    function buildFilters() {
      const gf = document.getElementById('genreFilters');
      const tf = document.getElementById('typeFilters');

      gf.innerHTML = `<button class="chip active" data-g="all" onclick="toggleGenre(this,'all')">All</button>` +
        GENRES.map(g => `<button class="chip" data-g="${g}" onclick="toggleGenre(this,'${g.replace(/'/g, "\\'")}')">${g}</button>`).join('');

      tf.innerHTML = `<button class="chip active" data-t="all" onclick="toggleType(this,'all')">All</button>` +
        TYPES.map(t => `<button class="chip" data-t="${t}" onclick="toggleType(this,'${t}')">${t}</button>`).join('');
    }

    function getColor(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
      }
      const h = Math.abs(hash) % 360;
      return `hsl(${h}, 70%, 45%)`;
    }

    function toggleGenre(el, val) {
      if(val==='all') {
        activeGenres.clear();
        document.querySelectorAll('#genreFilters .chip').forEach(c=>{
          c.classList.remove('active');
          c.style.backgroundColor='';
          c.style.color='';
          c.style.borderColor='';
        });
        el.classList.add('active');
      } else {
        const all = document.querySelector('#genreFilters .chip[data-g="all"]');
        all.classList.remove('active');
        all.style.backgroundColor='';
        all.style.color='';
        all.style.borderColor='';
        
        el.classList.toggle('active');
        if(el.classList.contains('active')) {
          activeGenres.add(val);
          el.style.backgroundColor = getColor(val);
          el.style.color = '#fff';
          el.style.borderColor = 'transparent';
        } else {
          activeGenres.delete(val);
          el.style.backgroundColor = '';
          el.style.color = '';
          el.style.borderColor = '';
        }
        if(activeGenres.size===0) {
          all.classList.add('active');
        }
      }
      updatePoolInfo();
    }

    function toggleType(el, val) {
      if(val==='all') {
        activeTypes.clear();
        document.querySelectorAll('#typeFilters .chip').forEach(c=>{
          c.classList.remove('active');
          c.style.backgroundColor='';
          c.style.color='';
          c.style.borderColor='';
        });
        el.classList.add('active');
      } else {
        const all = document.querySelector('#typeFilters .chip[data-t="all"]');
        all.classList.remove('active');
        all.style.backgroundColor='';
        all.style.color='';
        all.style.borderColor='';

        el.classList.toggle('active');
        if(el.classList.contains('active')) {
          activeTypes.add(val);
          el.style.backgroundColor = getColor(val);
          el.style.color = '#fff';
          el.style.borderColor = 'transparent';
        } else {
          activeTypes.delete(val);
          el.style.backgroundColor = '';
          el.style.color = '';
          el.style.borderColor = '';
        }
        if(activeTypes.size===0) {
          all.classList.add('active');
        }
      }
      updatePoolInfo();
    }

    // ── SQL query builder ─────────────────────────────────────
    function buildQuery(forCount = false) {
      const conditions = [];
      const params = {};

      if (activeGenres.size > 0) {
        const gKeys = [...activeGenres].map((g, i) => { params[`:g${i}`] = g; return `:g${i}`; });
        conditions.push(`genre IN (${gKeys.join(',')})`);
      }
      if (activeTypes.size > 0) {
        const tKeys = [...activeTypes].map((t, i) => { params[`:t${i}`] = t; return `:t${i}`; });
        conditions.push(`type IN (${tKeys.join(',')})`);
      }

      const where = conditions.length ? `WHERE ${conditions.join(' AND ')}` : '';
      const sql = forCount
        ? `SELECT COUNT(*) as cnt FROM songs ${where}`
        : `SELECT * FROM songs ${where} ORDER BY RANDOM() LIMIT 1`;

      return { sql, params };
    }

    function formatQueryDisplay(sql, params) {
      let pretty = sql;
      for (const [k, v] of Object.entries(params)) {
        pretty = pretty.replace(k, `'${v}'`);
      }
      return pretty
        .replace(/\b(SELECT|FROM|WHERE|IN|AND|ORDER BY|LIMIT|COUNT)\b/g, '<span class="kw">$1</span>')
        .replace(/'([^']+)'/g, '<span class="val">\'$1\'</span>');
    }

    // ── Update pool count ─────────────────────────────────────
    function updatePoolInfo() {
      if (!db) return;
      try {
        const { sql, params } = buildQuery(true);
        const result = db.exec(sql, params);
        const count = result[0]?.values[0][0] ?? 0;
        const gLabel = activeGenres.size === 0 ? 'all genres' : `${activeGenres.size} genre${activeGenres.size > 1 ? 's' : ''}`;
        const tLabel = activeTypes.size === 0 ? 'all types' : `${activeTypes.size} type${activeTypes.size > 1 ? 's' : ''}`;
        document.getElementById('poolInfo').innerHTML = `<span>${count.toLocaleString()}</span> songs in pool · ${gLabel} · ${tLabel}`;
      } catch (e) { }
    }

    // ── Shuffle ───────────────────────────────────────────────
    function shuffle() {
      if (!db) return;

      const btn = document.getElementById('shuffleBtn');
      const icon = document.getElementById('btnIcon');
      icon.innerHTML = '<span class="spin">&#x21BB;</span>';
      btn.disabled = true;

      setTimeout(() => {
        try {
          const { sql, params } = buildQuery(false);

          // Show query
          const qBox = document.getElementById('queryBox');
          document.getElementById('queryCode').innerHTML = formatQueryDisplay(sql, params);
          qBox.classList.add('visible');

          const result = db.exec(sql, params);

          if (!result.length || !result[0].values.length) {
            document.getElementById('card').innerHTML = `<p class="empty-state">No songs match your filters</p>`;
            document.getElementById('ytBtn').style.display = 'none';
            icon.innerHTML = '&#x21BB;';
            btn.disabled = false;
            return;
          }

          const cols = result[0].columns;
          const row = result[0].values[0];
          const song = {};
          cols.forEach((c, i) => song[c] = row[i]);

          shuffleCount++;
          lastRowId = song.id;

          const card = document.getElementById('card');
          card.classList.add('has-song');
          card.innerHTML = `
        <div class="fade-up">
          <div class="tag-row">
            <span class="tag tag-genre">${song.genre}</span>
            <span class="tag tag-type">${song.type}</span>
          </div>
          <p class="song-title">${song.title}</p>
          <p class="song-artist">${song.artist}</p>
          <p class="song-year">${song.year}</p>
        </div>
      `;

          const ytUrl = 'https://www.youtube.com/results?search_query=' + encodeURIComponent(`${song.title} ${song.artist} official audio`);
          const ytBtn = document.getElementById('ytBtn');
          ytBtn.href = ytUrl;
          ytBtn.style.display = 'inline-flex';
          
          document.getElementById('meta').textContent = shuffleCount + ' shuffled';
          
          const playlist = document.getElementById('playlist');
          const item = document.createElement('div');
          item.className = 'playlist-item fade-in';
          item.innerHTML = `
            <div class="song-info">
              <span class="song-title-sm">${song.title}</span>
              <span class="song-artist-sm">${song.artist}</span>
            </div>
            <div class="song-tags-sm">
              <span class="tag-sm" style="background:${getColor(song.genre)}; color:#fff">${song.genre}</span>
              <span class="tag-sm" style="background:${getColor(song.type)}; color:#fff">${song.type}</span>
            </div>
          `;
          playlist.prepend(item);
        } catch (e) {
          document.getElementById('card').innerHTML = `<p class="empty-state">Query error: ${e.message}</p>`;
        }

        icon.innerHTML = '&#x21BB;';
        btn.disabled = false;
      }, 200);
    }

    // ── Init: load sql.js + fetch JSON + populate DB ──────────
    async function init() {
      const statusEl = document.getElementById('dbStatus');
      buildFilters();

      try {
        setProgress(10);
        statusEl.textContent = 'loading sql engine…';

        const SQL = await initSqlJs({
          locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${file}`
        });

        setProgress(35);
        statusEl.textContent = 'fetching songs…';

        const res = await fetch(SONGS_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status} — check your GitHub repo and songs.json path`);
        const songs = await res.json();

        setProgress(65);
        statusEl.textContent = 'building database…';

        db = new SQL.Database();

        db.run(`
      CREATE TABLE songs (
        id INTEGER PRIMARY KEY,
        title TEXT NOT NULL,
        artist TEXT NOT NULL,
        year INTEGER,
        genre TEXT,
        type TEXT
      );
      CREATE INDEX idx_genre ON songs(genre);
      CREATE INDEX idx_type ON songs(type);
      CREATE INDEX idx_genre_type ON songs(genre, type);
    `);

        // Batch insert with prepared statement
        db.run('BEGIN TRANSACTION');
        const stmt = db.prepare('INSERT INTO songs VALUES (:id,:title,:artist,:year,:genre,:type)');
        for (const s of songs) {
          stmt.run({ ':id': s.id, ':title': s.title, ':artist': s.artist, ':year': s.year, ':genre': s.genre, ':type': s.type });
        }
        stmt.free();
        db.run('COMMIT');

        setProgress(100);
        statusEl.textContent = `${songs.length.toLocaleString()} songs ready`;
        statusEl.classList.add('ready');

        document.getElementById('shuffleBtn').disabled = false;
        updatePoolInfo();

        setTimeout(() => setProgress(0), 600);

      } catch (e) {
        statusEl.textContent = `error: ${e.message}`;
        statusEl.classList.add('error');
        setProgress(0);
        console.error(e);
      }
    }

    init();
  </script>
</body>

</html>
