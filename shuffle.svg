<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <!-- This mask creates a clean gap where the two paths intersect -->
    <mask id="shuffle-cut">
      <!-- White background means everything is visible by default -->
      <rect width="24" height="24" fill="white" />
      <!-- The black stroke acts as an eraser to create a gap for the intersecting line -->
      <path d="M4 18h4c3 0 5-12 8-12h4" stroke="black" stroke-width="5" />
    </mask>
  </defs>

  <!-- Top-Left to Bottom-Right Path (Appears underneath due to mask) -->
  <path d="M4 6h4c3 0 5 12 8 12h4" mask="url(#shuffle-cut)" />
  <polyline points="17 15 20 18 17 21" mask="url(#shuffle-cut)" />

  <!-- Bottom-Left to Top-Right Path (Appears on top) -->
  <path d="M4 18h4c3 0 5-12 8-12h4" />
  <polyline points="17 3 20 6 17 9" />
</svg>
